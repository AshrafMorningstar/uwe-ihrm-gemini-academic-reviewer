
<!DOCTYPE html>

    <meta charset="UTF-8" />

    <title>Ashraf Morningstar | IHRM Specialist & Creative Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');
      
      :root {
        --uwe-blue: #002d56;
        --uwe-red: #e4002b;
      }

      body {
        font-family: 'Inter', sans-serif;
        scroll-behavior: smooth;
        overflow-x: hidden;
      }
      
      .academic-header {
        font-family: 'Playfair Display', serif;
      }

      .mono {
        font-family: 'JetBrains Mono', monospace;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .uwe-gradient {
        background: linear-gradient(135deg, #002d56 0%, #001a33 100%);
      }

      .text-glow {
        text-shadow: 0 0 15px rgba(228, 0, 43, 0.4);
      }

      @keyframes skeleton-loading {
        0% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--uwe-blue);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--uwe-red);
      }
    </style>
